<header class="topbar">

  
  <a class="brand" routerLink="/dashboard" aria-label="ENGIE Queries — Accueil">
    <img src="assets/engie-logo-white.svg" alt="ENGIE" class="topbar-logo" />
    <span class="brand-label">Queries</span>
  </a>

  
  <nav class="topbar-nav" role="navigation" aria-label="Navigation principale">
    <a routerLink="/dashboard"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }"
       class="nav-link">
      Dashboard
    </a>
    <a *ngIf="isAdmin()"
    routerLink="/users"
       routerLinkActive="active"
       class="nav-link">
      Utilisateurs
    </a>
    <a routerLink="/groups"
       routerLinkActive="active"
       class="nav-link">
      Groupes
    </a>
    <a *ngIf="!isAdmin()"
       routerLink="/queries"
       routerLinkActive="active"
       class="nav-link">
      Requêtes
    </a>
    <a *ngIf="isAdmin()"
       routerLink="/audits"
       routerLinkActive="active"
       class="nav-link">
      Audits
    </a>
    <a
     [routerLink]="['/users', currentUserId]"
     routerLinkActive="active"
       class="nav-link">
       Profil
      </a>
  </nav>

  
  <div class="topbar-right">

    
    <button class="theme-toggle"
            (click)="toggleTheme()"
            [attr.aria-label]="isDark ? 'Passer en mode clair' : 'Passer en mode sombre'"
            [title]="isDark ? 'Mode clair' : 'Mode sombre'">
      
      <svg *ngIf="isDark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      
      <svg *ngIf="!isDark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <div class="user-pill">
      <span class="user-avatar" aria-hidden="true">{{ currentName.charAt(0).toUpperCase() }}</span>
      <span class="user-name">{{ currentName }}</span>
      <span *ngIf="isAdmin()" class="admin-badge">ADMIN</span>
    </div>

    <button class="logout-btn" (click)="logout()" aria-label="Se déconnecter">
      Déconnexion
    </button>
  </div>

</header>
