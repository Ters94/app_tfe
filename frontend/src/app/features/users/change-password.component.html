<div class="page-container">
  <h2>Changer le mot de passe</h2>

  <div *ngIf="errorMessage" class="global-error">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="global-success">{{ successMessage }}</div>

  <form (ngSubmit)="submit()" novalidate>

    <div class="form-group">
      <label>Ancien mot de passe</label>
      <input
        [(ngModel)]="oldPassword"
        name="oldPassword"
        type="password"
        [class.input-error]="fieldErrors.oldPassword"
        placeholder="Votre mot de passe actuel"
      />
      <div class="error" *ngIf="fieldErrors.oldPassword">{{ fieldErrors.oldPassword }}</div>
    </div>

    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <input
        [(ngModel)]="newPassword"
        name="newPassword"
        type="password"
        [class.input-error]="fieldErrors.newPassword"
        placeholder="Nouveau mot de passe"
      />
      <div class="error" *ngIf="fieldErrors.newPassword">{{ fieldErrors.newPassword }}</div>
    </div>

    <div class="form-group">
      <label>Confirmer le nouveau mot de passe</label>
      <input
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        type="password"
        [class.input-error]="fieldErrors.confirmPassword"
        placeholder="Retaper le nouveau mot de passe"
      />
      <div class="error" *ngIf="fieldErrors.confirmPassword">{{ fieldErrors.confirmPassword }}</div>
    </div>

    <div class="actions">
      <button type="submit">Confirmer</button>
      <button type="button" (click)="goBack()">Annuler</button>
    </div>

  </form>
</div>
