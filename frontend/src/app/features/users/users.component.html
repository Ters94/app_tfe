<div class="app-page">

 

  <main class="content">
    <div class="page-header">
      <h2>Liste des utilisateurs</h2>

      <button *ngIf="role === 'ADMIN'" class="primary-btn" (click)="createUser()">
        + Nouvel utilisateur
      </button>
    </div>

    <div class="toolbar">
      <input
        [(ngModel)]="searchTerm"
        placeholder="Rechercher par nom, prénom, email..."
      />
    </div>

    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Username</th>
          <th>Email</th>
          <th>Rôle</th>
          <th *ngIf="isAdmin" class="actions-col">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let user of filteredUsers">
          <td>{{ user.lastname || '-' }}</td>
          <td>{{ user.name || '-' }}</td>
          <td>{{ user.username || '-' }}</td>
          <td>{{ user.email || '-' }}</td>
          <td>
            <span class="badge" [class.admin]="user.role === 'ADMIN'">
              {{ user.role }}
            </span>
          </td>

          <td class="actions" *ngIf="isAdmin">
            <button *ngIf="isAdmin" (click)="viewUser(user)">Consulter</button>

            <button *ngIf="isAdmin" (click)="editUser(user)">
              Modifier
            </button>

            <button *ngIf="isAdmin" class="danger" (click)="deleteUser(user.id)">
              Supprimer
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </main>

</div>
