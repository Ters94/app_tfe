<div class="page-container">
  <h2>{{ isEdit ? 'Modifier un utilisateur' : 'Créer un utilisateur' }}</h2>

  <div *ngIf="errorMessage" class="global-error">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="saveUser()" novalidate>

    <div class="form-group">
      <label>Nom</label>
      <input
        [(ngModel)]="user.lastname"
        name="lastname"
        (ngModelChange)="generateUsername()"
        [class.input-error]="fieldErrors.lastname"
      />
      <div class="error" *ngIf="fieldErrors.lastname">
        {{ fieldErrors.lastname }}
      </div>
    </div>

    <div class="form-group">
      <label>Prénom</label>
      <input
        [(ngModel)]="user.name"
        name="name"
        (ngModelChange)="generateUsername()"
        [class.input-error]="fieldErrors.name"
      />
      <div class="error" *ngIf="fieldErrors.name">
        {{ fieldErrors.name }}
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input
        [(ngModel)]="user.username"
        name="username"
        [class.input-error]="fieldErrors.username"
        readonly
      />
      <div class="error" *ngIf="fieldErrors.username">
        {{ fieldErrors.username }}
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        [(ngModel)]="user.email"
        name="email"
        type="email"
        [class.input-error]="fieldErrors.email"
      />
      <div class="error" *ngIf="fieldErrors.email">
        {{ fieldErrors.email }}
      </div>
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <input
        [(ngModel)]="user.phone"
        name="phone"
        (input)="cleanPhone()"
        [class.input-error]="fieldErrors.phone"
        placeholder="Ex : 0470123456 ou +32470123456"
      />
      <div class="error" *ngIf="fieldErrors.phone">
        {{ fieldErrors.phone }}
      </div>
    </div>

    <div class="form-group">
      <label>Adresse</label>
      <input
        [(ngModel)]="user.address"
        name="address"
        [class.input-error]="fieldErrors.address"
      />
      <div class="error" *ngIf="fieldErrors.address">
        {{ fieldErrors.address }}
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input
        [(ngModel)]="user.password"
        name="password"
        type="password"
        [class.input-error]="fieldErrors.password"
        [placeholder]="isEdit ? 'Laisser vide pour ne pas changer' : ''"
      />
      <div class="error" *ngIf="fieldErrors.password">
        {{ fieldErrors.password }}
      </div>
    </div>

    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        type="password"
        [class.input-error]="fieldErrors.confirmPassword"
        [placeholder]="isEdit ? 'Confirmer le nouveau mot de passe' : 'Confirmer le mot de passe'"
      />
      <div class="error" *ngIf="fieldErrors.confirmPassword">
        {{ fieldErrors.confirmPassword }}
      </div>
    </div>

    <div class="actions">
      <button type="submit">
        {{ isEdit ? 'Modifier' : 'Créer' }}
      </button>

      <button type="button" (click)="goBack()">
        Annuler
      </button>

      <button type="button" routerLink="/dashboard">
        Accueil
      </button>
    </div>

  </form>
</div>
