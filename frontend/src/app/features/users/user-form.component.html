<h2>
  {{ isEdit ? 'Modifier' : 'Créer' }} un utilisateur
</h2>

<form (ngSubmit)="saveUser()">

  <div>
    <label>Nom</label><br>
    <input type="text" 
    [(ngModel)]="user.lastname" 
    name="nom"
    (input)="generateUsername()"
     required>
  </div>

  <div>
    <label>Prénom</label><br>
    <input type="text"
     [(ngModel)]="user.name" 
     name="prenom"
     (input)="generateUsername()"
      required>
  </div>
  <div>
    <div>
  <label>Username</label><br>
  <input type="text" [(ngModel)]="user.username" name="username" readonly>
</div>
    <label>Email</label><br>
    <input type="email" [(ngModel)]="user.email" name="email" required>
  </div>

  <div>
    <label>Téléphone</label><br>
    <input type="text" [(ngModel)]="user.phone" name="phone">
  </div>

    <div>
    <label>Adresse</label><br>
    <input type="text" [(ngModel)]="user.address" name="address">
  </div>

  <div *ngIf="!isEdit">
    <label>Mot de passe</label><br>
    <input type="password" [(ngModel)]="user.password" name="password" required>
  </div>

  <br>

  <button type="submit">
    {{ isEdit ? 'Modifier' : 'Créer' }}
  </button>

  <button type="button" (click)="goBack()">
    Annuler
  </button>
  
<p style="color:red" *ngIf="errorMessage">
  {{ errorMessage }}
</p>
</form>
