<div class="app-page">


  <main class="content">

    <h2>Tableau de bord</h2>
    <p class="welcome">Bienvenue {{ username }}</p>

    <div class="cards">

      <!-- ADMIN -->
      <div class="card" *ngIf="role === 'ADMIN'" routerLink="/users">
        <h3>Gestion des utilisateurs</h3>
        <p>Créer, modifier et supprimer des utilisateurs</p>
      </div>

      <div class="card" routerLink="/groups">
        <h3>Groupes</h3>
        <p>Gérer les groupes et les membres</p>
      </div>



      <div class="card admin" *ngIf="role === 'ADMIN'" routerLink="/audits">
        <h3>Audit</h3>
        <p>Consulter les logs et activités</p>
      </div>


      <div *ngIf="role === 'USER'"  class="card" routerLink="/queries">
        <h3>Queries</h3>
        <p>Créer et consulter les requêtes</p>
      </div>
      <div class="card user" *ngIf="role === 'USER'" [routerLink]="['/users', user_id]">
        <h3>Mon profil</h3>
        <p>Consulter et modifier vos informations</p>
      </div>

    </div>

  </main>

</div>
