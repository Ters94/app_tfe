<div class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">ENGIE – Queries</div>

      <h2 class="login-title">Mot de passe oublié</h2>
      <p class="login-subtitle">Saisissez votre email pour recevoir un lien de réinitialisation</p>

      <form *ngIf="!submitted" (ngSubmit)="submit()">
        <div class="form-group">
          <label>EMAIL</label>
          <input
            [(ngModel)]="email"
            name="email"
            type="email"
            placeholder="user@example.com"
            required
          />
        </div>

        <button type="submit" class="submit-btn">Envoyer le lien</button>
      </form>

      <p *ngIf="message" class="success-message">
        {{ message }}
      </p>

      <p *ngIf="error" class="error-message">
        {{ error }}
      </p>

      <a routerLink="/" class="forgot-link">Retour à la connexion</a>
    </div>
  </div>
</div>
