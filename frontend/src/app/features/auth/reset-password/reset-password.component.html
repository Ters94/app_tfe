<div class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">ENGIE – Queries</div>

      <h2 class="login-title">Réinitialiser le mot de passe</h2>
      <p class="login-subtitle">Choisissez un nouveau mot de passe</p>

      <form *ngIf="!done" (ngSubmit)="submit()">
        <div class="form-group">
          <label>NOUVEAU MOT DE PASSE</label>
          <input
            [(ngModel)]="newPassword"
            name="newPassword"
            type="password"
            placeholder="••••••"
            [class.input-error]="fieldErrors.newPassword"
          />
          <div class="field-error" *ngIf="fieldErrors.newPassword">{{ fieldErrors.newPassword }}</div>
        </div>

        <div class="form-group">
          <label>CONFIRMER LE MOT DE PASSE</label>
          <input
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            type="password"
            placeholder="••••••"
            [class.input-error]="fieldErrors.confirmPassword"
          />
          <div class="field-error" *ngIf="fieldErrors.confirmPassword">{{ fieldErrors.confirmPassword }}</div>
        </div>

        <button type="submit" class="submit-btn">Réinitialiser</button>
      </form>

      <p *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </p>

      <p *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </p>

      <a routerLink="/" class="forgot-link">Retour à la connexion</a>
    </div>
  </div>
</div>
